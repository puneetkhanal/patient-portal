# Patient Portal Production (with MongoDB Atlas)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: patient-portal-app-prod
    restart: unless-stopped
    platform: linux/amd64
    env_file:
      - env.prod
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - patient-portal-network

networks:
  patient-portal-network:
    driver: bridge
